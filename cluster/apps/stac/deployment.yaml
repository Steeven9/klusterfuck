apiVersion: apps/v1
kind: Deployment
metadata:
  name: stac
  namespace: stac
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: stac
          image: soulsbros/stac
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
