# Network policy for source-controller: allows access to external sources
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: source-controller
  namespace: flux-system
spec:
  podSelector:
    matchLabels:
      app: source-controller
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow other Flux controllers to fetch artifacts from source-controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: flux-system
      ports:
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 80
  egress:
    # Allow HTTPS to external Git/Helm/OCI endpoints
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
    # Allow SSH for Git over SSH
    - ports:
        - protocol: TCP
          port: 22
