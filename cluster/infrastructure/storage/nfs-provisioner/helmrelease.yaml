apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nfs-subdir-provisioner
  namespace: storage
spec:
  interval: 1h
  chart:
    spec:
      chart: nfs-subdir-external-provisioner
      version: ">=4.0.0"
      sourceRef:
        kind: HelmRepository
        name: nfs-subdir-provisioner
        namespace: flux-system
  values:
    nfs:
      server: "192.168.178.93" # TrueNAS IP
      path: "/mnt/media/k8s" # NFS export path
    storageClass:
      name: nfs
      defaultClass: true
      reclaimPolicy: Retain
    resources:
      limits:
        memory: 64Mi
        cpu: 100m
